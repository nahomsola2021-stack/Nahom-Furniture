<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Nahom Furniture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Poppins', sans-serif; } </style>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="w-full max-w-md bg-white p-8 rounded-lg shadow-lg">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900">NAHOM<span class="text-orange-500">FURNITURE</span></h1>
            <p class="text-gray-500 mt-2">Administrator Login</p>
        </div>
        <form id="adminLoginForm">
            <div class="mb-4">
                <label for="admin-email" class="block mb-1 font-semibold">Email</label>
                <input type="email" id="admin-email" class="w-full px-4 py-2 border rounded-lg" required>
            </div>
            <div class="mb-6">
                <label for="admin-password" class="block mb-1 font-semibold">Password</label>
                <input type="password" id="admin-password" class="w-full px-4 py-2 border rounded-lg" required>
            </div>
            <button type="submit" class="w-full bg-orange-500 text-white py-3 rounded-lg font-semibold hover:bg-orange-600 transition">Login</button>
        </form>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('admin-email').value;
            const password = document.getElementById('admin-password').value;
            
            firebase.auth().signInWithEmailAndPassword(email, password)
                .then(userCredential => userCredential.user.getIdTokenResult())
                .then(idTokenResult => {
                    if (!!idTokenResult.claims.admin) {
                        window.location.href = 'admin.html';
                    } else {
                        alert('Access Denied. You are not an authorized admin.');
                        firebase.auth().signOut();
                    }
                })
                .catch(error => alert(`Login Failed: ${error.message}`));
        });
    </script>
</body>
</html>
